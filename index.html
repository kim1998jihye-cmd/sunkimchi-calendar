<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선김치 프로모션 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh;padding:1.5rem 2rem}
.container{max-width:1600px;margin:0 auto;background:#fff;border-radius:16px;padding:1.75rem 2rem;box-shadow:0 2px 12px rgba(0,0,0,0.07)}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:2px solid #f0f0f0}
.tab{font-size:14px;font-weight:500;padding:8px 20px;border:none;background:none;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:700}
.tab-panel{display:none}.tab-panel.on{display:block}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:0.875rem}
.topbar h2{font-size:17px;font-weight:600;color:#111;flex:1}
.btn-primary{font-size:13px;padding:7px 16px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer}
.btn-primary:hover{background:#3C3489}
.btn-secondary{font-size:13px;padding:7px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#555;cursor:pointer}
.btn-secondary:hover{background:#f5f5f3}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav-label{font-size:15px;font-weight:600;color:#111;min-width:100px;text-align:center}
.nav-btn{font-size:13px;padding:5px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;cursor:pointer}
.nav-btn:hover{background:#f5f5f3}
.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;font-size:12px;color:#888}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;flex-shrink:0}
.sync-dot.ok{background:#3B6D11}.sync-dot.err{background:#E24B4A}
.sync-dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-sync{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;cursor:pointer}
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.search-wrap{position:relative;flex:1;max-width:360px}
.search-wrap input{width:100%;font-size:13px;padding:7px 30px 7px 32px;border:1px solid #ddd;border-radius:8px;outline:none}
.search-wrap input:focus{border-color:#534AB7}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none}
.scl{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:17px;color:#aaa;cursor:pointer;background:none;border:none;display:none;line-height:1;padding:0}
.s-count{font-size:12px;color:#888}
.sr-panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:0.875rem;display:none}
.sr-title{font-size:13px;color:#666;margin-bottom:0.625rem;font-weight:500}
.sr-empty{font-size:13px;color:#999;text-align:center;padding:1.25rem 0}
.sr-item{border:1px solid #eee;border-radius:8px;padding:0.625rem 0.875rem;margin-bottom:6px}
.sr-item:last-child{margin-bottom:0}
.sr-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.sr-name{font-size:13px;font-weight:600;color:#111}
.sr-date{font-size:12px;color:#999}
.sr-hl{background:#FAEEDA;color:#633806;border-radius:2px;padding:0 2px}
.sr-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.sr-tbl th{color:#999;font-weight:400;text-align:left;padding:3px 8px 3px 0;border-bottom:1px solid #eee}
.sr-tbl td{padding:4px 8px 4px 0;border-bottom:1px solid #eee;color:#111}
.sr-tbl tr:last-child td{border:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem}
.pill{font-size:12px;padding:4px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.pill:hover{background:#f5f5f3}.pill.on{font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.metric{background:#f7f7f5;border-radius:10px;padding:0.75rem 1rem}
.metric .lb{font-size:11px;color:#999;margin-bottom:3px}
.metric .val{font-size:22px;font-weight:600;color:#111}

/* 캘린더 */
.cal-outer{border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f7f7f5;border-bottom:1px solid #e0e0e0}
.ch{font-size:12px;color:#999;text-align:center;padding:8px 0;font-weight:500}
.week-wrap{position:relative;border-bottom:1px solid #e0e0e0}
.week-wrap:last-child{border-bottom:none}
.week-cells{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{border-right:1px solid #e0e0e0;padding:4px 3px 5px 4px;background:#fff}
.day-cell:last-child{border-right:none}
.day-cell.other{background:#fafafa}
.day-cell.sun .dn{color:#E24B4A}
.day-cell.sat .dn{color:#E24B4A}
.holiday-badge{display:inline-block;font-size:10px;font-weight:600;color:#fff;background:#E24B4A;border-radius:4px;padding:1px 5px;margin-left:2px;vertical-align:middle;white-space:nowrap}
.dn{font-size:12px;color:#999;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%}
.day-cell.today .dn{background:#534AB7;color:#fff;font-weight:600}
.bars-layer{position:absolute;top:0;left:0;right:0;pointer-events:none;overflow:hidden}
.bar-slot{position:relative;pointer-events:none}
.ebar{position:absolute;height:28px;border-radius:4px;padding:1px 6px;cursor:pointer;overflow:hidden;pointer-events:auto;display:flex;flex-direction:column;justify-content:center}
.ebar:hover{filter:brightness(0.93)}
.ebar.dimmed{opacity:0.18}
.en{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ep{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;opacity:0.85}

/* 지원사업 목록 */
.support-list-wrap{margin-top:0.5rem}
.support-list-title{font-size:14px;font-weight:600;color:#111;margin-bottom:0.75rem;display:flex;align-items:center;gap:8px}
.support-tbl{width:100%;border-collapse:collapse;font-size:13px}
.support-tbl th{background:#f7f7f5;color:#888;font-weight:500;text-align:left;padding:9px 12px;border-bottom:2px solid #e0e0e0;font-size:12px;white-space:nowrap}
.support-tbl td{padding:10px 12px;border-bottom:1px solid #f0f0f0;color:#111;vertical-align:middle}
.support-tbl tr:last-child td{border-bottom:none}
.support-tbl tr:hover td{background:#f9f9f7;cursor:pointer}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-done{background:#EEEDFE;color:#3C3489}
.badge-pending{background:#FEF3E2;color:#7A4800}
.deadline-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#FCEBEB;color:#A32D2D;font-weight:600;margin-left:4px}

/* 팝업 */
.pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:290;display:none}
.pop{position:fixed;z-index:300;background:#fff;border-radius:16px;width:min(520px,92vw);max-height:82vh;display:none;box-shadow:0 8px 40px rgba(0,0,0,0.18);overflow:hidden;flex-direction:column;top:50%;left:50%;transform:translate(-50%,-50%)}
.pop-header{padding:1.2rem 1.4rem 0.875rem;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.pop-plat-badge{font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px;font-weight:600}
.pop-name{font-size:16px;font-weight:700;color:#111;margin-bottom:4px;line-height:1.4}
.pop-date{font-size:12px;color:#999}
.pop-body{padding:1rem 1.4rem;overflow-y:auto;flex:1}
.pop-sec-title{font-size:11px;color:#aaa;font-weight:600;letter-spacing:0.05em;margin-bottom:8px}
.pop-tbl{width:100%;font-size:13px;border-collapse:collapse;margin-bottom:1rem}
.pop-tbl th{color:#aaa;font-weight:500;text-align:left;padding:5px 10px 5px 0;border-bottom:1px solid #eee;font-size:11px}
.pop-tbl td{padding:8px 10px 8px 0;border-bottom:1px solid #f5f5f5;color:#111;vertical-align:middle}
.pop-tbl tr:last-child td{border:none}
.pop-orig{text-decoration:line-through;color:#ccc;font-size:12px}
.pop-sale{color:#993C1D;font-weight:700;font-size:14px}
.pop-disc{background:#FCEBEB;color:#A32D2D;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block}
.pop-memo-box{font-size:12px;color:#666;background:#f9f9f7;border-radius:8px;padding:10px 12px;line-height:1.6}
.pop-footer{padding:0.875rem 1.4rem;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-shrink:0}
.pop-btn-edit{font-size:13px;padding:7px 18px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-weight:500}
.pop-btn-edit:hover{background:#f5f5f3}
.pop-btn-close{font-size:13px;padding:7px 18px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#999;cursor:pointer;margin-left:auto}
.pop-btn-close:hover{background:#f5f5f3}
.spop{position:fixed;z-index:300;background:#fff;border-radius:16px;width:min(580px,94vw);max-height:85vh;display:none;box-shadow:0 8px 40px rgba(0,0,0,0.18);overflow:hidden;flex-direction:column;top:50%;left:50%;transform:translate(-50%,-50%)}
.spop-header{padding:1.2rem 1.4rem 0.875rem;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.spop-title{font-size:16px;font-weight:700;color:#111;margin-bottom:6px;line-height:1.4}
.spop-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#888}
.spop-body{padding:1rem 1.4rem;overflow-y:auto;flex:1}
.spop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.spop-field{background:#f9f9f7;border-radius:8px;padding:8px 12px}
.spop-field .sf-label{font-size:11px;color:#aaa;font-weight:500;margin-bottom:3px}
.spop-field .sf-value{font-size:13px;color:#111;font-weight:500}
.spop-field.full{grid-column:1/-1}
.spop-sec-title{font-size:11px;color:#aaa;font-weight:600;letter-spacing:0.05em;margin-bottom:10px;margin-top:0.25rem}
.doc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #eee;border-radius:8px;cursor:pointer;transition:background 0.1s}
.doc-item:hover{background:#f9f9f7}
.doc-item.checked{background:#EAF3DE;border-color:#639922}
.doc-cb{width:18px;height:18px;border:2px solid #ddd;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s}
.doc-item.checked .doc-cb{background:#3B6D11;border-color:#3B6D11;color:#fff}
.doc-name{font-size:13px;color:#111;font-weight:500;flex:1}
.doc-item.checked .doc-name{color:#27500A}
.all-done-msg{font-size:12px;color:#27500A;background:#EAF3DE;border-radius:8px;padding:8px 12px;text-align:center;font-weight:600;margin-bottom:0.75rem;display:none}
.spop-footer{padding:0.875rem 1.4rem;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-shrink:0;align-items:center}
.spop-save-msg{font-size:12px;color:#888;margin-right:auto}
.spop-btn-save{font-size:13px;padding:7px 18px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer;font-weight:500}
.spop-btn-save:hover{background:#3C3489}
.spop-btn-close{font-size:13px;padding:7px 18px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#999;cursor:pointer}
.spop-btn-close:hover{background:#f5f5f3}

/* 모달 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:400}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(500px,94vw);max-height:88vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;color:#111}
.frow{margin-bottom:0.875rem}
.frow label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:#534AB7}
.frow textarea{height:56px;resize:vertical}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pw{border:1px solid #ddd;border-radius:8px;padding:10px}
.ph{display:grid;grid-template-columns:1fr 82px 82px 26px;gap:6px;margin-bottom:5px}
.ph span{font-size:11px;color:#aaa;font-weight:500}
.pr{display:grid;grid-template-columns:1fr 82px 82px 26px;gap:6px;margin-bottom:6px;align-items:center}
.pr input{font-size:12px;padding:5px 7px;border:1px solid #ddd;border-radius:6px}
.ap{font-size:12px;color:#534AB7;background:none;border:none;cursor:pointer;padding:2px 0;font-weight:500}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.bcl{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer}
.bsv{font-size:13px;padding:7px 16px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer}
.bsv:hover{background:#3C3489}
.bdl{font-size:13px;padding:7px 16px;border:1px solid #E24B4A;border-radius:8px;background:#fff;color:#E24B4A;cursor:pointer;margin-right:auto}
.plat-modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(500px,94vw);max-height:88vh;overflow-y:auto}
.plat-modal h2{font-size:16px;font-weight:600;margin-bottom:0.25rem;color:#111}
.plat-modal .sub{font-size:12px;color:#aaa;margin-bottom:1rem}
.plat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.plat-item{display:grid;grid-template-columns:28px 1fr 60px 60px 44px 32px;gap:6px;align-items:center;background:#f9f9f9;border-radius:8px;padding:7px 10px}
.plat-item .pi-idx{font-size:11px;color:#bbb;text-align:center}
.plat-item input[type=text]{font-size:13px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;width:100%}
.plat-item input[type=color]{width:100%;height:32px;padding:2px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff}
.pi-preview{font-size:11px;padding:3px 6px;border-radius:6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-del{font-size:18px;color:#E24B4A;background:none;border:none;cursor:pointer;line-height:1;padding:0}
.plat-add-row{display:flex;gap:8px;align-items:center}
.plat-add-row input[type=text]{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;flex:1;outline:none}
.plat-add-row input[type=color]{width:44px;flex:none;height:36px;padding:2px;border-radius:8px;cursor:pointer;border:1px solid #ddd}
.btn-plat-add{font-size:13px;padding:7px 14px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer;white-space:nowrap}
.plat-head{display:grid;grid-template-columns:28px 1fr 60px 60px 44px 32px;gap:6px;padding:0 10px;margin-bottom:4px}
.plat-head span{font-size:11px;color:#bbb}
.saving-msg{font-size:12px;color:#888;margin-top:8px;text-align:center}
@media(max-width:700px){body{padding:0.75rem}.metrics{grid-template-columns:repeat(2,1fr)}.spop-grid{grid-template-columns:1fr}.support-tbl{font-size:12px}}
</style>
</head>
<body>
<div class="container">
<h1 style="font-size:20px;font-weight:700;color:#111;margin-bottom:1rem">🥬 선김치 프로모션 캘린더</h1>
<div class="tabs">
  <button class="tab on" onclick="switchTab('event',this)">📦 행사 캘린더</button>
  <button class="tab" onclick="switchTab('support',this)">🏛 지원사업 캘린더</button>
</div>

<div class="tab-panel on" id="tab-event">
  <div class="topbar">
    <h2>행사 일정</h2>
    <div class="cal-nav">
      <button class="nav-btn" onclick="navM('event',-1)">&#8592;</button>
      <span class="cal-nav-label" id="e-mlabel"></span>
      <button class="nav-btn" onclick="navM('event',1)">&#8594;</button>
    </div>
    <button class="btn-secondary" onclick="openPlatModal()">⚙ 플랫폼 관리</button>
    <button class="btn-primary" onclick="openModal()">+ 행사 등록</button>
  </div>
  <div class="sync-bar">
    <span class="sync-dot loading" id="sdot"></span>
    <span id="smsg">데이터 불러오는 중...</span>
    <button class="btn-sync" onclick="loadAll()">&#8635; 새로고침</button>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="sq" placeholder="행사명 또는 상품명 검색..." oninput="doSearch(this.value)">
      <button class="scl" id="scl" onclick="clearSrch()">&#215;</button>
    </div>
    <span class="s-count" id="scnt"></span>
  </div>
  <div class="sr-panel" id="srp"><div class="sr-title" id="srt"></div><div id="srl"></div></div>
  <div class="filters" id="filters"></div>
  <div class="metrics" id="e-metrics"></div>
  <div class="cal-outer">
    <div class="cal-head-row">
      <div class="ch" style="color:#E24B4A">일</div>
      <div class="ch">월</div><div class="ch">화</div><div class="ch">수</div>
      <div class="ch">목</div><div class="ch">금</div><div class="ch">토</div>
    </div>
    <div id="e-calbody"><div style="text-align:center;padding:4rem;color:#aaa">⏳ 불러오는 중...</div></div>
  </div>
</div>

<div class="tab-panel" id="tab-support">
  <div class="topbar">
    <h2>지원사업 일정</h2>
    <div class="cal-nav">
      <button class="nav-btn" onclick="navM('support',-1)">&#8592;</button>
      <span class="cal-nav-label" id="s-mlabel"></span>
      <button class="nav-btn" onclick="navM('support',1)">&#8594;</button>
    </div>
    <button class="btn-primary" onclick="openSModal()">+ 지원사업 등록</button>
  </div>
  <div class="metrics" id="s-metrics"></div>
  <div class="cal-outer">
    <div class="cal-head-row">
      <div class="ch" style="color:#E24B4A">일</div>
      <div class="ch">월</div><div class="ch">화</div><div class="ch">수</div>
      <div class="ch">목</div><div class="ch">금</div><div class="ch">토</div>
    </div>
    <div id="s-calbody"><div style="text-align:center;padding:4rem;color:#aaa">⏳ 불러오는 중...</div></div>
  </div>
  <div class="support-list-wrap">
    <div class="support-list-title">📋 지원사업 목록<span id="s-list-count" style="font-size:12px;color:#aaa;font-weight:400"></span></div>
    <div style="overflow-x:auto">
      <table class="support-tbl">
        <thead><tr><th>지원사업명</th><th>사업자명</th><th>신청기간</th><th>지원쇼핑몰</th><th>담당자</th><th>대행여부</th><th>서류상태</th></tr></thead>
        <tbody id="s-list-body"><tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa">데이터를 불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<div class="pop-overlay" id="pop-overlay" onclick="closePop();closeSpop()"></div>
<div class="pop" id="pop">
  <div class="pop-header" id="pop-header"></div>
  <div class="pop-body" id="pop-body"></div>
  <div class="pop-footer">
    <button class="pop-btn-edit" id="pop-btn-edit">✏️ 편집</button>
    <button class="pop-btn-close" onclick="closePop()">닫기</button>
  </div>
</div>
<div class="spop" id="spop">
  <div class="spop-header" id="spop-header"></div>
  <div class="spop-body" id="spop-body"></div>
  <div class="spop-footer">
    <span class="spop-save-msg" id="spop-save-msg"></span>

<script>
// ── 한국 공휴일 ──
const HOLIDAYS={
  '01-01':'신정','03-01':'삼일절','05-05':'어린이날','06-06':'현충일',
  '08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'크리스마스',
  // 2025
  '2025-01-28':'설날연휴','2025-01-29':'설날','2025-01-30':'설날연휴',
  '2025-03-03':'대체휴무일','2025-05-06':'대체휴무일',
  '2025-06-03':'대체휴무일',
  '2025-10-05':'추석연휴','2025-10-06':'추석연휴','2025-10-07':'추석',
  '2025-10-08':'추석연휴',
  // 2026
  '2026-01-28':'설날연휴','2026-02-16':'설날연휴','2026-02-17':'설날','2026-02-18':'설날연휴'
  '2026-03-02':'대체휴무일',
  '2026-05-01':'노동절',
  '2026-05-24':'부처님오신날','2026-05-25':'대체휴무일',
  '2026-06-03':'지방선거','2026-07-17':'제헌절','2026-08-17':'대체휴무일',
  '2026-09-24':'추석연휴','2026-09-25':'추석','2026-09-26':'추석연휴',
  '2026-10-05':'대체휴무일',
};

function getHoliday(dateStr){
  if(HOLIDAYS[dateStr]) return HOLIDAYS[dateStr];
  const mmdd=dateStr.slice(5);
  return HOLIDAYS[mmdd]||null;
}

const GAS='https://script.google.com/macros/s/AKfycbxAW-hsytkEi11EDac-oHZV5_KEVIwpMnI7tpDd4uPyjbHVq1MGR37RctU8cMxcoiYMOA/exec';
const DEFAULT_PLATS=[
  {id:'naver',name:'네이버 스마트스토어',bg:'#E6F1FB',tc:'#0C447C'},
  {id:'sun',name:'선김치몰',bg:'#EAF3DE',tc:'#27500A'},
  {id:'coupang',name:'쿠팡',bg:'#FAECE7',tc:'#712B13'},
  {id:'kakao',name:'카카오쇼핑',bg:'#FAEEDA',tc:'#633806'},
  {id:'wemake',name:'위메프',bg:'#FBEAF0',tc:'#72243E'},
  {id:'tmon',name:'티몬',bg:'#F1EFE8',tc:'#5F5E5A'},
  {id:'11st',name:'11번가',bg:'#FCEBEB',tc:'#791F1F'},
  {id:'etc',name:'기타',bg:'#F1EFE8',tc:'#444441'},
];
const BAR_H=28, BAR_GAP=2, DATE_H=28, PAD=10;

let plats=[],evs=[],supports=[];
let curP='all';
let eY=new Date().getFullYear(),eM=new Date().getMonth();
let sY=new Date().getFullYear(),sM=new Date().getMonth();
let editId=null,srchQ='',srchIds=new Set();
let curSpopIdx=null,spopDocs=[];

function fmt(n){return Number(n).toLocaleString()+'원'}
function pad(n){return String(n).padStart(2,'0')}
function dstr(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}
function today(){const d=new Date();return dstr(d.getFullYear(),d.getMonth(),d.getDate())}
function fmtDate(v){
  if(!v)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(v).trim()))return String(v).trim();
  const d=new Date(v);if(isNaN(d))return String(v).trim();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function platById(id){return plats.find(p=>p.id===String(id))||{name:id,bg:'#F1EFE8',tc:'#444'};}
function filt(){return curP==='all'?evs:evs.filter(e=>e.plat===curP)}
function isUrgent(ds){if(!ds)return false;const diff=(new Date(ds)-new Date(today()))/(864e5);return diff>=0&&diff<=7;}
function isExpired(ds){return ds&&ds<today()}
function isAllDone(docs){return docs&&docs.length>0&&docs.every(d=>d.done)}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
}
function setSyncStatus(s,m){document.getElementById('sdot').className='sync-dot '+s;document.getElementById('smsg').textContent=m;}
async function gasGet(p=''){const r=await fetch(GAS+'?t='+Date.now()+(p?'&'+p:''));return r.json();}
async function gasPost(b){const r=await fetch(GAS,{method:'POST',body:JSON.stringify(b)});return r.json();}

async function loadAll(){
  setSyncStatus('loading','데이터 불러오는 중...');
  try{
    const [ej,pj,sj]=await Promise.all([gasGet('type=events'),gasGet('type=plats'),gasGet('type=support')]);
    if(ej.ok)evs=ej.data.map(e=>({...e,id:Number(e.id)||e.id,start:fmtDate(e.start),end:fmtDate(e.end),products:Array.isArray(e.products)?e.products:[]}));
    plats=(pj.ok&&pj.data&&pj.data.length>0)?pj.data:JSON.parse(JSON.stringify(DEFAULT_PLATS));
    if(sj.ok)supports=sj.data.map(s=>({...s,'신청시작일':fmtDate(s['신청시작일']),'신청마감일':fmtDate(s['신청마감일']),'필요서류':Array.isArray(s['필요서류'])?s['필요서류']:[]}));
    const now=new Date();
    setSyncStatus('ok','연동 완료 · '+now.getHours()+':'+pad(now.getMinutes())+' 기준');
    renderAll();
  }catch(e){setSyncStatus('err','연결 실패 — 새로고침을 눌러주세요');renderAll();}
}

function renderAll(){renderFilters();renderEMetrics();renderECal();renderSMetrics();renderSCal();renderSList();}

function renderFilters(){
  let h=`<button class="pill${curP==='all'?' on':''}" onclick="setP('all')" style="${curP==='all'?'background:#EEEDFE;color:#3C3489;border-color:#534AB7':''}">전체</button>`;
  plats.forEach(p=>{const on=curP===p.id;h+=`<button class="pill${on?' on':''}" onclick="setP('${p.id}')" style="${on?`background:${p.bg};color:${p.tc};border-color:${p.tc}`:''}"> ${p.name}</button>`;});
  document.getElementById('filters').innerHTML=h;
}
function setP(p){curP=p;renderFilters();renderEMetrics();renderECal();}
function navM(tab,d){
  if(tab==='event'){eM+=d;if(eM<0){eM=11;eY--;}if(eM>11){eM=0;eY++;}renderEMetrics();renderECal();}
  else{sM+=d;if(sM<0){sM=11;sY--;}if(sM>11){sM=0;sY++;}renderSMetrics();renderSCal();renderSList();}
}

function renderEMetrics(){
  const ev=filt(),t=today();
  document.getElementById('e-mlabel').textContent=eY+'년 '+(eM+1)+'월';
  document.getElementById('e-metrics').innerHTML=`
    <div class="metric"><div class="lb">전체 행사</div><div class="val">${ev.length}</div></div>
    <div class="metric"><div class="lb">진행중</div><div class="val" style="color:#3B6D11">${ev.filter(e=>e.start<=t&&t<=e.end).length}</div></div>
    <div class="metric"><div class="lb">예정</div><div class="val" style="color:#185FA5">${ev.filter(e=>e.start>t).length}</div></div>
    <div class="metric"><div class="lb">종료</div><div class="val" style="color:#aaa">${ev.filter(e=>e.end<t).length}</div></div>`;
}
function renderECal(){document.getElementById('e-calbody').innerHTML=buildCal(eY,eM,filt(),'event');}

function renderSMetrics(){
  const t=today();
  document.getElementById('s-mlabel').textContent=sY+'년 '+(sM+1)+'월';
  document.getElementById('s-metrics').innerHTML=`
    <div class="metric"><div class="lb">전체 지원사업</div><div class="val">${supports.length}</div></div>
    <div class="metric"><div class="lb">신청중</div><div class="val" style="color:#3B6D11">${supports.filter(s=>s['신청시작일']<=t&&t<=s['신청마감일']).length}</div></div>
    <div class="metric"><div class="lb">마감임박 (7일)</div><div class="val" style="color:#A32D2D">${supports.filter(s=>isUrgent(s['신청마감일'])&&!isExpired(s['신청마감일'])).length}</div></div>
    <div class="metric"><div class="lb">서류준비완료</div><div class="val" style="color:#534AB7">${supports.filter(s=>isAllDone(s['필요서류'])).length}</div></div>`;
}
function renderSCal(){
  const sEvs=supports.map(s=>({id:String(s._rowIndex),name:s['지원사업명'],start:s['신청시작일'],end:s['신청마감일'],_done:isAllDone(s['필요서류']),_urgent:isUrgent(s['신청마감일']),_expired:isExpired(s['신청마감일'])}));
  document.getElementById('s-calbody').innerHTML=buildCal(sY,sM,sEvs,'support');
}

// ── 캘린더 빌더 ──
function buildCal(Y,M,evList,type){
  const firstDay=new Date(Y,M,1).getDay();
  const dim=new Date(Y,M+1,0).getDate();
  const pdim=new Date(Y,M,0).getDate();
  const t=today();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--){const pm=M===0?11:M-1,py=M===0?Y-1:Y;cells.push({y:py,m:pm,d:pdim-i,other:true});}
  for(let d=1;d<=dim;d++)cells.push({y:Y,m:M,d,other:false});
  while(cells.length%7!==0){const nm=M===11?0:M+1,ny=M===11?Y+1:Y;cells.push({y:ny,m:nm,d:cells.length-firstDay-dim+1,other:true});}

  let html='';
  for(let w=0;w<cells.length/7;w++){
    const week=cells.slice(w*7,w*7+7);
    const wS=dstr(week[0].y,week[0].m,week[0].d);
    const wE=dstr(week[6].y,week[6].m,week[6].d);
    const wev=evList.filter(e=>e.start<=wE&&e.end>=wS).sort((a,b)=>a.start.localeCompare(b.start)||(a.end<b.end?1:-1));

    // 슬롯 배정
    const placed=[];
    wev.forEach(e=>{
      let sc=0,ec=6;
      week.forEach((c,ci)=>{const s=dstr(c.y,c.m,c.d);if(s===e.start)sc=ci;if(s===e.end)ec=ci;});
      if(e.start<wS)sc=0;if(e.end>wE)ec=6;
      sc=Math.max(0,sc);ec=Math.min(6,ec);
      let slot=0;
      while(placed.some(p=>p.slot===slot&&!(p.ec<sc||p.sc>ec)))slot++;
      placed.push({e,sc,ec,slot});
    });

    // 핵심: 각 셀별 실제 바 개수 계산 → 가장 많은 셀 기준으로 rowH 결정
    const barsPerCell=Array(7).fill(0);
    placed.forEach(({sc,ec})=>{for(let ci=sc;ci<=ec;ci++)barsPerCell[ci]++;});
    const maxBars=Math.max(0,...barsPerCell);
    const maxSlot=placed.length?Math.max(...placed.map(p=>p.slot)):-1;
    const rowH=Math.max(80, DATE_H + maxBars*(BAR_H+BAR_GAP) + PAD);

    html+=`<div class="week-wrap" style="min-height:${rowH}px"><div class="week-cells" style="min-height:${rowH}px">`;
    week.forEach((c,ci)=>{
      const s=dstr(c.y,c.m,c.d);
      const isSun=ci===0, isSat=ci===6;
      const holiday=getHoliday(s);
      const isRed=isSun||isSat||!!holiday;
      html+=`<div class="day-cell${c.other?' other':''}${s===t?' today':''}${isSun?' sun':''}${isSat?' sat':''}" style="min-height:${rowH}px">
        <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
          <div class="dn" style="${isRed&&!isSun&&!isSat?'color:#E24B4A':''}"> ${c.d}</div>
          ${holiday?`<span class="holiday-badge">${holiday}</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div><div class="bars-layer" style="height:${rowH}px">`;

    for(let sl=0;sl<=maxSlot;sl++){
      const slotTop=DATE_H+sl*(BAR_H+BAR_GAP);
      html+=`<div class="bar-slot" style="position:absolute;top:${slotTop}px;left:0;right:0;height:${BAR_H}px">`;
      placed.filter(p=>p.slot===sl).forEach(({e,sc,ec})=>{
        const isStart=e.start>=wS&&dstr(week[sc].y,week[sc].m,week[sc].d)===e.start;
        const isEnd=e.end<=wE;
        const rL=isStart?'4px':'0',rR=isEnd?'4px':'0';
        const W=((ec-sc+1)/7*100).toFixed(2),L=(sc/7*100).toFixed(2);
        let bg,tc,label;
        if(type==='event'){const pl=platById(e.plat);bg=pl.bg;tc=pl.tc;label=`[${pl.name}] ${e.name}`;}
        else{
          bg=e._done?'#EAF3DE':e._expired?'#F1EFE8':e._urgent?'#FCEBEB':'#FEF3E2';
          tc=e._done?'#27500A':e._expired?'#888':e._urgent?'#A32D2D':'#7A4800';
          label=e.name;
        }
        const dimmed=type==='event'&&srchQ&&!srchIds.has(e.id)?'dimmed':'';
        const onclick=type==='event'?`showPop(event,'${String(e.id).replace(/'/g,"\\'")}')`:  `showSpop(event,'${String(e.id).replace(/'/g,"\\'")}')`;
        const pt=type==='event'&&e.products?e.products.map(p=>p.name+' '+fmt(p.sale)).join(' · '):'';
        const dlBar=type==='support'&&isEnd&&!e._expired?`<span style="position:absolute;right:0;top:0;bottom:0;width:5px;background:rgba(0,0,0,0.2);border-radius:0 ${rR} ${rR} 0"></span>`:'';
        html+=`<div class="ebar ${dimmed}" style="left:calc(${L}% + 1px);width:calc(${W}% - 3px);height:${BAR_H}px;border-radius:${rL} ${rR} ${rR} ${rL};background:${bg};color:${tc};position:absolute" onclick="${onclick}">
          <span class="en">${label}${type==='support'&&isEnd&&!e._expired?' ⚠':''}${type==='support'&&e._done?' ✓':''}</span>
          ${type==='event'?`<span class="ep">${pt}</span>`:''}
          ${dlBar}
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div></div>`;
  }
  return html;
}

function renderSList(){
  document.getElementById('s-list-count').textContent='총 '+supports.length+'건';
  if(!supports.length){document.getElementById('s-list-body').innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa">등록된 지원사업이 없습니다.</td></tr>';return;}
  const sorted=[...supports].sort((a,b)=>a['신청마감일'].localeCompare(b['신청마감일']));
  document.getElementById('s-list-body').innerHTML=sorted.map(s=>{
    const done=isAllDone(s['필요서류']),urgent=isUrgent(s['신청마감일'])&&!isExpired(s['신청마감일']),expired=isExpired(s['신청마감일']);
    const docBadge=done?`<span class="badge badge-done">✅ 준비완료</span>`:s['필요서류']&&s['필요서류'].length>0?`<span class="badge badge-pending">📋 서류준비중</span>`:`<span style="font-size:12px;color:#ccc">-</span>`;
    const dm=urgent?`<span class="deadline-badge">D-${Math.ceil((new Date(s['신청마감일'])-new Date(today()))/(864e5))}</span>`:'';
    return`<tr onclick="showSpop(event,'${String(s._rowIndex).replace(/'/g,"\\'")}')">
      <td><span style="font-weight:600">${s['지원사업명']}</span></td>
      <td>${s['사업자명']||'-'}</td>
      <td style="${expired?'color:#aaa':''}${urgent?';color:#A32D2D;font-weight:600':''}">${s['신청시작일']||'-'} ~ ${s['신청마감일']||'-'}${dm}</td>
      <td>${s['지원쇼핑몰']||'-'}</td><td>${s['담당자명']||'-'}</td>
      <td><span style="font-size:12px;color:${s['대행여부']==='대행'?'#534AB7':'#555'}">${s['대행여부']||'-'}</span></td>
      <td>${docBadge}</td>
    </tr>`;
  }).join('');
}

function showPop(ev,id){
  ev.stopPropagation();
  const e=evs.find(v=>String(v.id)===String(id));if(!e)return;
  const pl=platById(e.plat);
  const rows=e.products.map(p=>{const d=p.orig?Math.round((1-Number(p.sale)/Number(p.orig))*100):0;return`<tr><td style="font-weight:500">${p.name}</td><td class="pop-orig">${p.orig?fmt(p.orig):'-'}</td><td class="pop-sale">${fmt(p.sale)}</td><td>${d?`<span class="pop-disc">${d}%</span>`:''}</td></tr>`;}).join('');
  document.getElementById('pop-header').innerHTML=`<div class="pop-plat-badge" style="background:${pl.bg};color:${pl.tc}">${pl.name}</div><div class="pop-name">${e.name}</div><div class="pop-date">📅 ${e.start} ~ ${e.end}</div>`;
  document.getElementById('pop-body').innerHTML=`<div class="pop-sec-title">행사 상품 (${e.products.length}개)</div><table class="pop-tbl"><tr><th>상품명</th><th>정가</th><th>행사가</th><th>할인율</th></tr>${rows}</table>${e.memo?`<div class="pop-sec-title" style="margin-top:0.5rem">메모</div><div class="pop-memo-box">📌 ${e.memo}</div>`:''}`;
  document.getElementById('pop-btn-edit').onclick=()=>{closePop();openModal(id);};
  document.getElementById('pop').style.display='flex';
  document.getElementById('pop-overlay').style.display='block';
}
function closePop(){document.getElementById('pop').style.display='none';document.getElementById('pop-overlay').style.display='none';}

function showSpop(ev,rowIndex){
  ev.stopPropagation();
  const s=supports.find(x=>String(x._rowIndex)===String(rowIndex));if(!s)return;
  curSpopIdx=s._rowIndex;spopDocs=JSON.parse(JSON.stringify(s['필요서류']||[]));
  const expired=isExpired(s['신청마감일']),urgent=isUrgent(s['신청마감일'])&&!expired;
  document.getElementById('spop-header').innerHTML=`
    <div class="spop-title">${s['지원사업명']}</div>
    <div class="spop-meta">
      <span>📅 <span style="${urgent?'color:#A32D2D;font-weight:600':expired?'color:#aaa':''}">${s['신청시작일']||'-'} ~ ${s['신청마감일']||'-'}</span>${urgent?` <span class="deadline-badge">D-${Math.ceil((new Date(s['신청마감일'])-new Date(today()))/(864e5))}</span>`:''}</span>
      <span>🏢 ${s['주관단체']||'-'}</span>
    </div>`;
  const fields=[{label:'사업자명',value:s['사업자명']},{label:'지원쇼핑몰',value:s['지원쇼핑몰']},{label:'담당자',value:s['담당자명']},{label:'대행여부',value:s['대행여부']},{label:'지원사항',value:s['지원사항'],full:true},{label:'지원상품',value:s['지원상품'],full:true},{label:'비고',value:s['비고'],full:true}].filter(f=>f.value);
  const fieldHtml=fields.map(f=>`<div class="spop-field${f.full?' full':''}"><div class="sf-label">${f.label}</div><div class="sf-value">${f.value}</div></div>`).join('');
  const allDone=isAllDone(spopDocs);
  const docHtml=spopDocs.length>0?spopDocs.map((doc,i)=>`<div class="doc-item${doc.done?' checked':''}" onclick="toggleDoc(${i})" id="doc-item-${i}"><div class="doc-cb" id="doc-cb-${i}">${doc.done?'✓':''}</div><span class="doc-name">${doc.name}</span></div>`).join(''):`<div style="font-size:13px;color:#aaa;padding:0.5rem 0">등록된 필요서류가 없습니다.</div>`;
  document.getElementById('spop-body').innerHTML=`<div class="spop-grid">${fieldHtml}</div>${spopDocs.length>0?`<div class="spop-sec-title">필요서류 (${spopDocs.length}개)</div><div class="all-done-msg" id="all-done-msg" style="display:${allDone?'block':'none'}">🎉 모든 서류 준비 완료!</div><div class="doc-list">${docHtml}</div>`:''}`;
  document.getElementById('spop-save-msg').textContent='';
  document.getElementById('spop').style.display='flex';
  document.getElementById('pop-overlay').style.display='block';
}
function toggleDoc(i){
  spopDocs[i].done=!spopDocs[i].done;
  document.getElementById('doc-item-'+i).classList.toggle('checked',spopDocs[i].done);
  document.getElementById('doc-cb-'+i).textContent=spopDocs[i].done?'✓':'';
  document.getElementById('all-done-msg').style.display=spopDocs.every(d=>d.done)&&spopDocs.length>0?'block':'none';
}
async function saveSupport(){
  if(!curSpopIdx)return;
  document.getElementById('spop-save-msg').textContent='저장 중...';
  try{
    await gasPost({action:'updateSupport',support:{_rowIndex:curSpopIdx,'필요서류':spopDocs},docsOnly:true});
    const idx=supports.findIndex(s=>s._rowIndex===curSpopIdx);
    if(idx>-1)supports[idx]['필요서류']=spopDocs;
    document.getElementById('spop-save-msg').textContent='✅ 저장 완료!';
    renderSList();renderSMetrics();renderSCal();
  }catch{document.getElementById('spop-save-msg').textContent='❌ 저장 실패';}
}
function closeSpop(){document.getElementById('spop').style.display='none';document.getElementById('pop-overlay').style.display='none';}

function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="sr-hl">$1</span>');}
function doSearch(v){
  srchQ=v.trim();
  document.getElementById('scl').style.display=srchQ?'block':'none';
  if(!srchQ){srchIds=new Set();document.getElementById('srp').style.display='none';document.getElementById('scnt').textContent='';renderECal();return;}
  const q=srchQ.toLowerCase();
  const found=evs.filter(e=>e.name.toLowerCase().includes(q)||e.products.some(p=>p.name.toLowerCase().includes(q))).sort((a,b)=>a.start.localeCompare(b.start));
  srchIds=new Set(found.map(e=>e.id));
  document.getElementById('scnt').textContent=found.length+'건';
  document.getElementById('srt').textContent='"'+srchQ+'" 검색 결과 — '+found.length+'건 (날짜순)';
  document.getElementById('srp').style.display='block';
  if(!found.length){document.getElementById('srl').innerHTML='<div class="sr-empty">검색 결과가 없습니다.</div>';renderECal();return;}
  document.getElementById('srl').innerHTML=found.map(e=>{
    const pl=platById(e.plat);
    const badge=`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${pl.bg};color:${pl.tc};font-weight:500">${pl.name}</span>`;
    const nameMatch=e.name.toLowerCase().includes(srchQ.toLowerCase());
    const visibleProds=nameMatch?e.products:e.products.filter(p=>p.name.toLowerCase().includes(srchQ.toLowerCase()));
    const rows=visibleProds.map(p=>{const d=p.orig?Math.round((1-p.sale/p.orig)*100):0;return`<tr><td>${hl(p.name,srchQ)}</td><td style="text-decoration:line-through;color:#bbb">${fmt(p.orig)}</td><td style="color:#993C1D;font-weight:600">${fmt(p.sale)}</td><td style="color:#993C1D;font-size:11px">${d?d+'%':''}</td></tr>`;}).join('');
    return`<div class="sr-item"><div class="sr-top">${badge}<span class="sr-name">${hl(e.name,srchQ)}</span><span class="sr-date">${e.start} ~ ${e.end}</span></div><table class="sr-tbl"><tr><th>상품명</th><th>정가</th><th>행사가</th><th>할인율</th></tr>${rows}</table></div>`;
  }).join('');
  renderECal();
}
function clearSrch(){document.getElementById('sq').value='';doSearch('');}

let editSupRowIndex=null;
function openSModal(rowIndex){
  editSupRowIndex=rowIndex||null;
  document.getElementById('smtitle').textContent=rowIndex?'지원사업 수정':'지원사업 등록';
  document.getElementById('sf-bdl').style.display=rowIndex?'block':'none';
  document.getElementById('sf-doc-rows').innerHTML='';
  if(rowIndex){
    const s=supports.find(x=>x._rowIndex===rowIndex);if(!s)return;
    document.getElementById('sf-start').value=s['신청시작일']||'';
    document.getElementById('sf-end').value=s['신청마감일']||'';
    document.getElementById('sf-name').value=s['지원사업명']||'';
    document.getElementById('sf-biz').value=s['사업자명']||'';
    document.getElementById('sf-org').value=s['주관단체']||'';
    document.getElementById('sf-mall').value=s['지원쇼핑몰']||'';
    document.getElementById('sf-agency').value=s['대행여부']||'';
    document.getElementById('sf-manager').value=s['담당자명']||'';
    document.getElementById('sf-benefit').value=s['지원사항']||'';
    document.getElementById('sf-product').value=s['지원상품']||'';
    document.getElementById('sf-memo').value=s['비고']||'';
    (s['필요서류']||[]).forEach(d=>addDocRow(d.name,d.done));
  } else {
    ['sf-start','sf-end','sf-name','sf-biz','sf-org','sf-mall','sf-manager','sf-benefit','sf-product','sf-memo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('sf-agency').value='';
  }
  document.getElementById('smbg').classList.add('open');
}
function closeSModal(){document.getElementById('smbg').classList.remove('open');}
function addDocRow(name='',done=false){
  const d=document.createElement('div');d.className='pr';d.style.gridTemplateColumns='1fr auto';
  d.innerHTML=`<input type="text" placeholder="서류명 (예: 사업자등록증)" value="${name}" class="doc-name-input" style="font-size:13px;padding:5px 8px;border:1px solid #ddd;border-radius:6px"><button style="background:none;border:none;cursor:pointer;color:#E24B4A;font-size:15px;line-height:1;padding:0 4px" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('sf-doc-rows').appendChild(d);
}
async function saveSup(){
  const name=document.getElementById('sf-name').value.trim();
  const end=document.getElementById('sf-end').value;
  if(!name||!end){alert('지원사업명과 신청마감일은 필수예요.');return;}
  const oldDocs=editSupRowIndex?((supports.find(x=>x._rowIndex===editSupRowIndex)||{})['필요서류']||[]):[];
  const docs=[];
  document.querySelectorAll('#sf-doc-rows .doc-name-input').forEach(inp=>{
    const nm=inp.value.trim();if(nm){const ex=oldDocs.find(d=>d.name===nm);docs.push({name:nm,done:ex?ex.done:false});}
  });
  const s={'신청시작일':document.getElementById('sf-start').value,'신청마감일':end,'지원사업명':name,'사업자명':document.getElementById('sf-biz').value.trim(),'주관단체':document.getElementById('sf-org').value.trim(),'지원쇼핑몰':document.getElementById('sf-mall').value.trim(),'지원사항':document.getElementById('sf-benefit').value.trim(),'지원상품':document.getElementById('sf-product').value.trim(),'대행여부':document.getElementById('sf-agency').value,'담당자명':document.getElementById('sf-manager').value.trim(),'필요서류':docs,'비고':document.getElementById('sf-memo').value.trim()};
  closeSModal();setSyncStatus('loading','저장 중...');
  try{
    if(editSupRowIndex){s._rowIndex=editSupRowIndex;await gasPost({action:'updateSupport',support:s,docsOnly:false});}
    else await gasPost({action:'addSupport',support:s});
    await loadAll();
  }catch{setSyncStatus('err','저장 실패');}
}
async function deleteSup(){
  if(!confirm('이 지원사업을 삭제할까요?'))return;
  closeSModal();setSyncStatus('loading','삭제 중...');
  try{await gasPost({action:'deleteSupport',rowIndex:editSupRowIndex});await loadAll();}
  catch{setSyncStatus('err','삭제 실패');}
}

function openModal(id){
  editId=id||null;
  document.getElementById('mtitle').textContent=id?'행사 수정':'행사 등록';
  document.getElementById('bdl').style.display=id?'block':'none';
  document.getElementById('prows').innerHTML='';
  document.getElementById('fp').innerHTML=plats.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(id){
    const e=evs.find(v=>String(v.id)===String(id));
    document.getElementById('fn').value=e.name;document.getElementById('fp').value=e.plat;
    document.getElementById('fst').value=e.start;document.getElementById('fen').value=e.end;
    document.getElementById('fm').value=e.memo||'';
    e.products.forEach(p=>addProd(p.name,p.orig,p.sale));
  } else {
    ['fn','fm'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fst').value='';document.getElementById('fen').value='';addProd();
  }
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function addProd(name='',orig='',sale=''){
  const d=document.createElement('div');d.className='pr';
  d.innerHTML=`<input type="text" placeholder="상품명" value="${name}" class="pn"><input type="number" placeholder="정가" value="${orig||''}" class="po"><input type="number" placeholder="행사가" value="${sale||''}" class="ps"><button style="background:none;border:none;cursor:pointer;color:#E24B4A;font-size:16px;line-height:1;padding:0" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('prows').appendChild(d);
}
async function saveEv(){
  const name=document.getElementById('fn').value.trim(),plat=document.getElementById('fp').value;
  const start=document.getElementById('fst').value,end=document.getElementById('fen').value,memo=document.getElementById('fm').value.trim();
  if(!name||!start||!end){alert('행사명, 시작일, 종료일을 입력해주세요.');return;}
  const products=[];
  document.querySelectorAll('#prows .pr').forEach(r=>{
    const nm=r.querySelector('.pn').value.trim(),or=Number(r.querySelector('.po').value)||0,sl=Number(r.querySelector('.ps').value)||0;
    if(nm)products.push({name:nm,orig:or,sale:sl});
  });
  const ev={name,plat,start,end,products,memo};
  closeModal();setSyncStatus('loading','저장 중...');
  try{
    if(editId){ev.id=editId;await gasPost({action:'update',event:ev});}
    else await gasPost({action:'add',event:ev});
    await loadAll();
  }catch{setSyncStatus('err','저장 실패');}
}
async function delEv(){
  if(!confirm('이 행사를 삭제할까요?'))return;
  closeModal();setSyncStatus('loading','삭제 중...');
  try{await gasPost({action:'delete',event:{id:editId}});await loadAll();}
  catch{setSyncStatus('err','삭제 실패');}
}

function openPlatModal(){renderPlatList();document.getElementById('plat-save-msg').textContent='';document.getElementById('pmbg').classList.add('open');}
function closePlatModal(){document.getElementById('pmbg').classList.remove('open');}
function renderPlatList(){
  document.getElementById('plat-list').innerHTML=plats.map((p,i)=>`
    <div class="plat-item"><span class="pi-idx">${i+1}</span>
    <input type="text" value="${p.name}" oninput="plats[${i}].name=this.value;updatePreview(${i})">
    <input type="color" value="${p.bg}" oninput="plats[${i}].bg=this.value;updatePreview(${i})">
    <input type="color" value="${p.tc}" oninput="plats[${i}].tc=this.value;updatePreview(${i})">
    <span class="pi-preview" id="prev-${i}" style="background:${p.bg};color:${p.tc}">${p.name.slice(0,4)}</span>
    <button class="pi-del" onclick="removePlatRow(${i})">×</button></div>`).join('');
}
function updatePreview(i){const el=document.getElementById('prev-'+i);if(el){el.style.background=plats[i].bg;el.style.color=plats[i].tc;el.textContent=plats[i].name.slice(0,4);}}
function addPlatRow(){
  const name=document.getElementById('new-plat-name').value.trim();if(!name){alert('플랫폼명을 입력해주세요.');return;}
  const bg=document.getElementById('new-plat-bg').value,tc=document.getElementById('new-plat-tc').value;
  plats.push({id:'plat_'+Date.now(),name,bg,tc});document.getElementById('new-plat-name').value='';renderPlatList();
}
function removePlatRow(i){
  if(plats.length<=1){alert('최소 1개의 플랫폼이 필요해요.');return;}
  if(!confirm(`"${plats[i].name}" 플랫폼을 삭제할까요?`))return;
  plats.splice(i,1);renderPlatList();
}
async function savePlats(){
  document.getElementById('plat-save-msg').textContent='저장 중...';
  try{
    await gasPost({action:'savePlats',plats});
    document.getElementById('plat-save-msg').textContent='✅ 저장 완료!';
    setTimeout(()=>{closePlatModal();renderAll();},800);
  }catch{document.getElementById('plat-save-msg').textContent='❌ 저장 실패';}
}

loadAll();
</script>
</body>
</html>
