<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선김치 행사 프로모션 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh;padding:1.5rem 2rem}
.container{max-width:1600px;margin:0 auto;background:#fff;border-radius:16px;padding:1.75rem 2rem;box-shadow:0 2px 12px rgba(0,0,0,0.07)}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:0.875rem}
.topbar h1{font-size:18px;font-weight:600;color:#111;flex:1}
.btn-add{font-size:13px;padding:7px 16px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer}
.btn-add:hover{background:#3C3489}
.btn-plat-mgr{font-size:13px;padding:7px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#555;cursor:pointer}
.btn-plat-mgr:hover{background:#f5f5f3}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav-label{font-size:15px;font-weight:600;color:#111;min-width:100px;text-align:center}
.nav-btn{font-size:13px;padding:5px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;cursor:pointer}
.nav-btn:hover{background:#f5f5f3}
.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;font-size:12px;color:#888}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;flex-shrink:0}
.sync-dot.ok{background:#3B6D11}
.sync-dot.err{background:#E24B4A}
.sync-dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-sync{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;cursor:pointer}
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.search-wrap{position:relative;flex:1;max-width:360px}
.search-wrap input{width:100%;font-size:13px;padding:7px 30px 7px 32px;border:1px solid #ddd;border-radius:8px;outline:none}
.search-wrap input:focus{border-color:#534AB7}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none}
.scl{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:17px;color:#aaa;cursor:pointer;background:none;border:none;display:none;line-height:1;padding:0}
.s-count{font-size:12px;color:#888}
.sr-panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:0.875rem;display:none}
.sr-title{font-size:13px;color:#666;margin-bottom:0.625rem;font-weight:500}
.sr-empty{font-size:13px;color:#999;text-align:center;padding:1.25rem 0}
.sr-item{border:1px solid #eee;border-radius:8px;padding:0.625rem 0.875rem;margin-bottom:6px}
.sr-item:last-child{margin-bottom:0}
.sr-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.sr-name{font-size:13px;font-weight:600;color:#111}
.sr-date{font-size:12px;color:#999}
.sr-hl{background:#FAEEDA;color:#633806;border-radius:2px;padding:0 2px}
.sr-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.sr-tbl th{color:#999;font-weight:400;text-align:left;padding:3px 8px 3px 0;border-bottom:1px solid #eee}
.sr-tbl td{padding:4px 8px 4px 0;border-bottom:1px solid #eee;color:#111}
.sr-tbl tr:last-child td{border:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem}
.pill{font-size:12px;padding:4px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.pill:hover{background:#f5f5f3}
.pill.on{font-weight:600;border-color:currentColor}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.metric{background:#f7f7f5;border-radius:10px;padding:0.75rem 1rem}
.metric .lb{font-size:11px;color:#999;margin-bottom:3px}
.metric .val{font-size:22px;font-weight:600;color:#111}
.cal-outer{border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f7f7f5;border-bottom:1px solid #e0e0e0}
.ch{font-size:12px;color:#999;text-align:center;padding:8px 0;font-weight:500}
.week-wrap{position:relative;border-bottom:1px solid #e0e0e0}
.week-wrap:last-child{border-bottom:none}
.week-cells{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{border-right:1px solid #e0e0e0;padding:4px 3px 5px 4px;background:#fff}
.day-cell:last-child{border-right:none}
.day-cell.other{background:#fafafa}
.day-cell.sun .dn{color:#E24B4A}
.dn{font-size:12px;color:#999;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%}
.day-cell.today .dn{background:#534AB7;color:#fff;font-weight:600}
.bars-layer{position:absolute;top:0;left:0;right:0;pointer-events:none}
.bar-slot{position:relative;height:30px;pointer-events:none}
.bar-slot:first-child{margin-top:29px}
.bar-slot+.bar-slot{margin-top:2px}
.ebar{position:absolute;height:28px;border-radius:4px;padding:1px 6px;cursor:pointer;overflow:hidden;pointer-events:auto;display:flex;flex-direction:column;justify-content:center}
.ebar:hover{filter:brightness(0.95)}
.ebar.dimmed{opacity:0.18}
.en{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ep{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;opacity:0.85}
/* 팝업 오버레이 */
.pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:290;display:none}
.pop-overlay.open{display:block}
/* 팝업 */
.pop{position:fixed;z-index:300;background:#fff;border-radius:16px;padding:0;width:min(480px,92vw);max-height:80vh;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;flex-direction:column;top:50%;left:50%;transform:translate(-50%,-50%)}
.pop.open{display:flex}
.pop-header{padding:1.1rem 1.25rem 0.75rem;border-bottom:1px solid #f0f0f0}
.pop-plat{font-size:11px;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:7px;font-weight:500}
.pop-name{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;line-height:1.4}
.pop-date{font-size:12px;color:#999}
.pop-body{padding:0.875rem 1.25rem;overflow-y:auto;flex:1}
.pop-section-title{font-size:11px;color:#aaa;font-weight:600;letter-spacing:0.04em;margin-bottom:6px;text-transform:uppercase}
.pop-tbl{width:100%;font-size:13px;border-collapse:collapse;margin-bottom:0.75rem}
.pop-tbl th{color:#aaa;font-weight:500;text-align:left;padding:5px 8px 5px 0;border-bottom:1px solid #f0f0f0;font-size:11px}
.pop-tbl td{padding:7px 8px 7px 0;border-bottom:1px solid #f5f5f5;color:#111;vertical-align:middle}
.pop-tbl tr:last-child td{border:none}
.pop-price-orig{text-decoration:line-through;color:#bbb;font-size:12px}
.pop-price-sale{color:#993C1D;font-weight:700}
.pop-disc{display:inline-block;background:#FCEBEB;color:#A32D2D;font-size:11px;padding:1px 6px;border-radius:4px;font-weight:600}
.pop-memo{font-size:12px;color:#888;background:#f9f9f7;border-radius:8px;padding:8px 10px;margin-top:4px}
.pop-footer{padding:0.75rem 1.25rem;border-top:1px solid #f0f0f0;display:flex;gap:8px}
.pop-edit{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-weight:500}
.pop-edit:hover{background:#f5f5f3}
.pop-close{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#999;cursor:pointer;margin-left:auto}
.pop-close:hover{background:#f5f5f3}
/* 모달 공통 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(500px,94vw);max-height:88vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;color:#111}
.frow{margin-bottom:0.875rem}
.frow label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:#534AB7}
.frow textarea{height:56px;resize:vertical}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pw{border:1px solid #ddd;border-radius:8px;padding:10px}
.ph{display:grid;grid-template-columns:1fr 82px 82px 26px;gap:6px;margin-bottom:5px}
.ph span{font-size:11px;color:#aaa;font-weight:500}
.pr{display:grid;grid-template-columns:1fr 82px 82px 26px;gap:6px;margin-bottom:6px;align-items:center}
.pr input{font-size:12px;padding:5px 7px;border:1px solid #ddd;border-radius:6px}
.ap{font-size:12px;color:#534AB7;background:none;border:none;cursor:pointer;padding:2px 0;font-weight:500}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.bcl{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer}
.bsv{font-size:13px;padding:7px 16px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer}
.bsv:hover{background:#3C3489}
.bdl{font-size:13px;padding:7px 16px;border:1px solid #E24B4A;border-radius:8px;background:#fff;color:#E24B4A;cursor:pointer;margin-right:auto}

/* 플랫폼 관리 모달 */
.plat-modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(460px,94vw);max-height:88vh;overflow-y:auto}
.plat-modal h2{font-size:16px;font-weight:600;margin-bottom:0.25rem;color:#111}
.plat-modal .sub{font-size:12px;color:#aaa;margin-bottom:1rem}
.plat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.plat-item{display:grid;grid-template-columns:32px 1fr 72px 72px 36px 36px;gap:6px;align-items:center;background:#f9f9f9;border-radius:8px;padding:7px 10px}
.plat-item .pi-idx{font-size:11px;color:#bbb;text-align:center}
.plat-item input[type=text]{font-size:13px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;width:100%}
.plat-item input[type=color]{width:100%;height:32px;padding:2px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff}
.pi-label{font-size:11px;color:#aaa;text-align:center}
.pi-del{font-size:18px;color:#E24B4A;background:none;border:none;cursor:pointer;line-height:1;padding:0}
.pi-drag{font-size:16px;color:#ccc;cursor:grab;line-height:1;padding:0;background:none;border:none}
.plat-add-row{display:flex;gap:8px;align-items:center}
.plat-add-row input{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;flex:1}
.plat-add-row input[type=color]{width:48px;flex:none;height:36px;padding:2px;border-radius:8px;cursor:pointer}
.btn-plat-add{font-size:13px;padding:7px 14px;border:1px solid #534AB7;border-radius:8px;background:#534AB7;color:#CECBF6;cursor:pointer;white-space:nowrap}
.plat-head{display:grid;grid-template-columns:32px 1fr 72px 72px 36px 36px;gap:6px;padding:0 10px;margin-bottom:4px}
.plat-head span{font-size:11px;color:#bbb;text-align:center}
.plat-head span:nth-child(2){text-align:left}

@media(max-width:600px){
  body{padding:0.75rem}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .topbar h1{font-size:15px}
}
</style>
</head>
<body>
<div class="container">

<div class="topbar">
  <h1>🥬 선김치 행사 프로모션 캘린더</h1>
  <div class="cal-nav">
    <button class="nav-btn" onclick="navM(-1)">&#8592;</button>
    <span class="cal-nav-label" id="mlabel"></span>
    <button class="nav-btn" onclick="navM(1)">&#8594;</button>
  </div>
  <button class="btn-plat-mgr" onclick="openPlatModal()">⚙ 플랫폼 관리</button>
  <button class="btn-add" onclick="openModal()">+ 행사 등록</button>
</div>

<div class="sync-bar">
  <span class="sync-dot loading" id="sdot"></span>
  <span id="smsg">Google Sheets 연결 중...</span>
  <button class="btn-sync" onclick="loadFromSheets()">&#8635; 새로고침</button>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="sq" placeholder="행사명 또는 상품명 검색..." oninput="doSearch(this.value)">
    <button class="scl" id="scl" onclick="clearSrch()">&#215;</button>
  </div>
  <span class="s-count" id="scnt"></span>
</div>
<div class="sr-panel" id="srp">
  <div class="sr-title" id="srt"></div>
  <div id="srl"></div>
</div>

<div class="filters" id="filters"></div>
<div class="metrics" id="metrics"></div>

<div class="cal-outer">
  <div class="cal-head-row">
    <div class="ch" style="color:#E24B4A">일</div>
    <div class="ch">월</div><div class="ch">화</div><div class="ch">수</div>
    <div class="ch">목</div><div class="ch">금</div><div class="ch">토</div>
  </div>
  <div id="calbody"><div style="text-align:center;padding:4rem;color:#aaa;font-size:14px">⏳ 데이터 불러오는 중...</div></div>
</div>
</div>

<!-- 팝업 오버레이 -->
<div class="pop-overlay" id="pop-overlay" onclick="closePop()"></div>
<!-- 팝업 -->
<div class="pop" id="pop">
  <div class="pop-header" id="pop-header"></div>
  <div class="pop-body" id="pop-body"></div>
  <div class="pop-footer">
    <button class="pop-edit" id="pop-edit">✏️ 편집</button>
    <button class="pop-close" onclick="closePop()">닫기</button>
  </div>
</div>

<!-- 행사 등록/수정 모달 -->
<div class="mbg" id="mbg" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <h2 id="mtitle">행사 등록</h2>
  <div class="frow"><label>행사명</label><input type="text" id="fn" placeholder="예) 어버이날 기획전"></div>
  <div class="frow"><label>플랫폼</label><select id="fp"></select></div>
  <div class="frow dg">
    <div><label>시작일</label><input type="date" id="fst"></div>
    <div><label>종료일</label><input type="date" id="fen"></div>
  </div>
  <div class="frow"><label>행사 상품</label>
    <div class="pw">
      <div class="ph"><span>상품명</span><span>정가</span><span>행사가</span><span></span></div>
      <div id="prows"></div>
      <button class="ap" onclick="addProd()">+ 상품 추가</button>
    </div>
  </div>
  <div class="frow"><label>메모</label><textarea id="fm" placeholder="특이사항, 담당자 등"></textarea></div>
  <div class="mbtns">
    <button class="bdl" id="bdl" style="display:none" onclick="delEv()">삭제</button>
    <button class="bcl" onclick="closeModal()">취소</button>
    <button class="bsv" onclick="saveEv()">저장</button>
  </div>
</div>
</div>

<!-- 플랫폼 관리 모달 -->
<div class="mbg" id="pmbg" onclick="if(event.target===this)closePlatModal()">
<div class="plat-modal">
  <h2>플랫폼 관리</h2>
  <div class="sub">플랫폼을 자유롭게 추가·수정·삭제할 수 있어요. 변경사항은 즉시 저장돼요.</div>
  <div class="plat-head">
    <span>#</span><span>플랫폼명</span><span style="text-align:center">배경색</span><span style="text-align:center">글자색</span><span></span><span></span>
  </div>
  <div class="plat-list" id="plat-list"></div>
  <div style="border-top:1px solid #eee;padding-top:0.875rem;margin-top:0.25rem">
    <div style="font-size:12px;color:#888;font-weight:500;margin-bottom:6px">새 플랫폼 추가</div>
    <div class="plat-add-row">
      <input type="text" id="new-plat-name" placeholder="플랫폼명 (예: 티몬)">
      <input type="color" id="new-plat-bg" value="#E6F1FB" title="배경색">
      <input type="color" id="new-plat-tc" value="#0C447C" title="글자색">
      <button class="btn-plat-add" onclick="addPlat()">+ 추가</button>
    </div>
  </div>
  <div class="mbtns" style="margin-top:1rem">
    <button class="bcl" onclick="closePlatModal()">닫기</button>
    <button class="bsv" onclick="savePlats()">저장</button>
  </div>
</div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxAW-hsytkEi11EDac-oHZV5_KEVIwpMnI7tpDd4uPyjbHVq1MGR37RctU8cMxcoiYMOA/exec';

// 기본 플랫폼 (로컬스토리지에 없으면 사용)
const DEFAULT_PLATS=[
  {id:'naver', name:'네이버 스마트스토어', bg:'#E6F1FB', tc:'#0C447C'},
  {id:'sun',   name:'선김치몰',            bg:'#EAF3DE', tc:'#27500A'},
  {id:'coupang',name:'쿠팡',              bg:'#FAECE7', tc:'#712B13'},
  {id:'kakao', name:'카카오쇼핑',          bg:'#FAEEDA', tc:'#633806'},
  {id:'wemake',name:'위메프',             bg:'#FBEAF0', tc:'#72243E'},
  {id:'tmon',  name:'티몬',              bg:'#F1EFE8', tc:'#444441'},
  {id:'11st',  name:'11번가',            bg:'#FCEBEB', tc:'#791F1F'},
  {id:'etc',   name:'기타',              bg:'#F1EFE8', tc:'#444441'},
];

let plats=[];
let evs=[],curP='all',curY=new Date().getFullYear(),curM=new Date().getMonth(),editId=null,srchQ='',srchIds=new Set();

/* ── 플랫폼 로드/저장 ── */
function loadPlats(){
  const saved=localStorage.getItem('sunkimchi_plats');
  plats=saved?JSON.parse(saved):JSON.parse(JSON.stringify(DEFAULT_PLATS));
}
function savePlatsLocal(){localStorage.setItem('sunkimchi_plats',JSON.stringify(plats));}

function platById(id){return plats.find(p=>p.id===id)||{name:id,bg:'#F1EFE8',tc:'#444'};}

/* ── 플랫폼 관리 모달 ── */
function openPlatModal(){
  renderPlatList();
  document.getElementById('pmbg').classList.add('open');
}
function closePlatModal(){document.getElementById('pmbg').classList.remove('open');}

function renderPlatList(){
  const list=document.getElementById('plat-list');
  list.innerHTML=plats.map((p,i)=>`
    <div class="plat-item" data-idx="${i}">
      <span class="pi-idx">${i+1}</span>
      <input type="text" value="${p.name}" placeholder="플랫폼명" onchange="plats[${i}].name=this.value">
      <input type="color" value="${p.bg}" title="배경색" onchange="plats[${i}].bg=this.value" style="height:32px">
      <input type="color" value="${p.tc}" title="글자색" onchange="plats[${i}].tc=this.value" style="height:32px">
      <span style="font-size:11px;padding:2px 6px;border-radius:10px;background:${p.bg};color:${p.tc};white-space:nowrap;text-align:center;line-height:28px">${p.name.slice(0,3)}</span>
      <button class="pi-del" onclick="removePlat(${i})">×</button>
    </div>`).join('');
}

function addPlat(){
  const name=document.getElementById('new-plat-name').value.trim();
  if(!name){alert('플랫폼명을 입력해주세요.');return;}
  const bg=document.getElementById('new-plat-bg').value;
  const tc=document.getElementById('new-plat-tc').value;
  const id='plat_'+Date.now();
  plats.push({id,name,bg,tc});
  document.getElementById('new-plat-name').value='';
  renderPlatList();
}

function removePlat(i){
  if(plats.length<=1){alert('최소 1개의 플랫폼이 필요해요.');return;}
  if(!confirm(`"${plats[i].name}" 플랫폼을 삭제할까요?`))return;
  plats.splice(i,1);
  renderPlatList();
}

function savePlats(){
  // 현재 입력값 동기화
  document.querySelectorAll('#plat-list .plat-item').forEach((el,i)=>{
    plats[i].name=el.querySelector('input[type=text]').value.trim()||plats[i].name;
    plats[i].bg=el.querySelector('input[type=color]:nth-of-type(1)').value;
    plats[i].tc=el.querySelector('input[type=color]:nth-of-type(2)').value;
  });
  savePlatsLocal();
  closePlatModal();
  renderFilters();
  render();
  alert('플랫폼이 저장됐어요!');
}

/* ── 필터 렌더 ── */
function renderFilters(){
  const f=document.getElementById('filters');
  let html=`<button class="pill${curP==='all'?' on':''}" onclick="setP(this,'all')" style="${curP==='all'?'background:#EEEDFE;color:#3C3489;border-color:#534AB7':''}">전체</button>`;
  plats.forEach(p=>{
    const on=curP===p.id;
    html+=`<button class="pill${on?' on':''}" onclick="setP(this,'${p.id}')" style="${on?`background:${p.bg};color:${p.tc};border-color:${p.tc}`:''}">${p.name}</button>`;
  });
  f.innerHTML=html;
}

/* ── Sheets 연동 ── */
function setSyncStatus(state,msg){
  document.getElementById('sdot').className='sync-dot '+state;
  document.getElementById('smsg').textContent=msg;
}
async function loadFromSheets(){
  setSyncStatus('loading','Google Sheets에서 불러오는 중...');
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now());
    const json=await res.json();
    if(json.ok){
      evs=json.data.map(e=>({
        ...e,
        id:Number(e.id)||e.id,
        start:fmtDate(e.start),
        end:fmtDate(e.end),
        products:Array.isArray(e.products)?e.products:[]
      }));
      const now=new Date();
      setSyncStatus('ok','연동 완료 · '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' 기준');
      render();
    } else throw new Error();
  } catch{
    setSyncStatus('err','연결 실패 — 새로고침을 눌러주세요');
    render();
  }
}
async function postToSheets(action,event){
  const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,event})});
  return res.json();
}

/* ── 검색 ── */
function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="sr-hl">$1</span>');}
function doSearch(v){
  srchQ=v.trim();
  document.getElementById('scl').style.display=srchQ?'block':'none';
  if(!srchQ){srchIds=new Set();document.getElementById('srp').style.display='none';document.getElementById('scnt').textContent='';renderCal();return;}
  const q=srchQ.toLowerCase();
  const found=evs.filter(e=>e.name.toLowerCase().includes(q)||e.products.some(p=>p.name.toLowerCase().includes(q))).sort((a,b)=>a.start.localeCompare(b.start));
  srchIds=new Set(found.map(e=>e.id));
  document.getElementById('scnt').textContent=found.length+'건';
  document.getElementById('srt').textContent='"'+srchQ+'" 검색 결과 — '+found.length+'건 (날짜순)';
  document.getElementById('srp').style.display='block';
  if(!found.length){document.getElementById('srl').innerHTML='<div class="sr-empty">검색 결과가 없습니다.</div>';renderCal();return;}
  document.getElementById('srl').innerHTML=found.map(e=>{
    const pl=platById(e.plat);
    const badge=`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${pl.bg};color:${pl.tc};font-weight:500">${pl.name}</span>`;
    const rows=e.products.map(p=>{const d=p.orig?Math.round((1-p.sale/p.orig)*100):0;return`<tr><td>${hl(p.name,srchQ)}</td><td style="text-decoration:line-through;color:#bbb">${fmt(p.orig)}</td><td style="color:#993C1D;font-weight:600">${fmt(p.sale)}</td><td style="color:#993C1D;font-size:11px">${d?d+'%':''}</td></tr>`;}).join('');
    return`<div class="sr-item"><div class="sr-top">${badge}<span class="sr-name">${hl(e.name,srchQ)}</span><span class="sr-date">${e.start} ~ ${e.end}</span></div><table class="sr-tbl"><tr><th>상품명</th><th>정가</th><th>행사가</th><th>할인율</th></tr>${rows}</table></div>`;
  }).join('');
  renderCal();
}
function clearSrch(){document.getElementById('sq').value='';doSearch('');}

// 날짜 문자열을 YYYY-MM-DD로 안전하게 변환 (timezone 오류 방지)
function fmtDate(v){
  if(!v)return'';
  // 이미 YYYY-MM-DD 형식이면 그대로
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(v).trim()))return String(v).trim();
  // Date 객체로 들어오는 경우 (Sheets가 Date 직렬화할 때)
  const d=new Date(v);
  if(isNaN(d))return String(v).trim();
  // UTC 기준이 아닌 로컬 날짜로 추출
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function fmt(n){return Number(n).toLocaleString()+'원'}
function pad(n){return String(n).padStart(2,'0')}
function dstr(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}
function today(){const d=new Date();return dstr(d.getFullYear(),d.getMonth(),d.getDate())}
function filt(){return curP==='all'?evs:evs.filter(e=>e.plat===curP)}
function setP(el,p){curP=p;renderFilters();render();}
function navM(d){curM+=d;if(curM<0){curM=11;curY--;}if(curM>11){curM=0;curY++;}render();}

function renderMetrics(){
  const ev=filt(),t=today();
  const a=ev.filter(e=>e.start<=t&&t<=e.end).length;
  const u=ev.filter(e=>e.start>t).length;
  const en=ev.filter(e=>e.end<t).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="lb">전체 행사</div><div class="val">${ev.length}</div></div>
    <div class="metric"><div class="lb">진행중</div><div class="val" style="color:#3B6D11">${a}</div></div>
    <div class="metric"><div class="lb">예정</div><div class="val" style="color:#185FA5">${u}</div></div>
    <div class="metric"><div class="lb">종료</div><div class="val" style="color:#aaa">${en}</div></div>`;
}
function render(){
  document.getElementById('mlabel').textContent=curY+'년 '+(curM+1)+'월';
  renderFilters();
  renderMetrics();
  renderCal();
}
function renderCal(){
  const firstDay=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  const pdim=new Date(curY,curM,0).getDate();
  const t=today();const ev=filt();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--){const pm=curM===0?11:curM-1,py=curM===0?curY-1:curY;cells.push({y:py,m:pm,d:pdim-i,other:true});}
  for(let d=1;d<=dim;d++)cells.push({y:curY,m:curM,d,other:false});
  while(cells.length%7!==0){const nm=curM===11?0:curM+1,ny=curM===11?curY+1:curY;cells.push({y:ny,m:nm,d:cells.length-firstDay-dim+1,other:true});}
  let html='';
  for(let w=0;w<cells.length/7;w++){
    const week=cells.slice(w*7,w*7+7);
    const wS=dstr(week[0].y,week[0].m,week[0].d);
    const wE=dstr(week[6].y,week[6].m,week[6].d);
    const wev=ev.filter(e=>e.start<=wE&&e.end>=wS).sort((a,b)=>a.start.localeCompare(b.start)||(a.end<b.end?1:-1));
    const placed=[];
    wev.forEach(e=>{
      let sc=0,ec=6;
      week.forEach((c,ci)=>{const s=dstr(c.y,c.m,c.d);if(s===e.start)sc=ci;if(s===e.end)ec=ci;});
      if(e.start<wS)sc=0;if(e.end>wE)ec=6;
      sc=Math.max(0,sc);ec=Math.min(6,ec);
      let slot=0;
      while(placed.some(p=>p.slot===slot&&!(p.ec<sc||p.sc>ec)))slot++;
      placed.push({e,sc,ec,slot});
    });
    const maxSlot=placed.length?Math.max(...placed.map(p=>p.slot)):-1;
    const cellH=Math.max(72,29+(maxSlot+1)*32+6);
    html+=`<div class="week-wrap"><div class="week-cells">`;
    week.forEach((c,ci)=>{
      const s=dstr(c.y,c.m,c.d);
      html+=`<div class="day-cell${c.other?' other':''}${s===t?' today':''}${ci===0?' sun':''}" style="min-height:${cellH}px"><div class="dn">${c.d}</div></div>`;
    });
    html+=`</div><div class="bars-layer">`;
    for(let sl=0;sl<=maxSlot;sl++){
      html+=`<div class="bar-slot" style="${sl===0?'margin-top:29px':'margin-top:2px'}">`;
      placed.filter(p=>p.slot===sl).forEach(({e,sc,ec})=>{
        const pl=platById(e.plat);
        const isStart=e.start>=wS&&dstr(week[sc].y,week[sc].m,week[sc].d)===e.start;
        const isEnd=e.end<=wE;
        const rL=isStart?'4px':'0';const rR=isEnd?'4px':'0';
        const W=((ec-sc+1)/7*100).toFixed(2);const L=(sc/7*100).toFixed(2);
        const dimmed=srchQ&&!srchIds.has(e.id)?'dimmed':'';
        const pt=e.products.map(p=>p.name+' '+fmt(p.sale)).join(' · ');
        const displayName=`[${pl.name}] ${e.name}`;
        html+=`<div class="ebar ${dimmed}" style="left:calc(${L}% + 1px);width:calc(${W}% - 3px);border-radius:${rL} ${rR} ${rR} ${rL};background:${pl.bg};color:${pl.tc}" onclick="showPop(event,${JSON.stringify(String(e.id))})">
          <span class="en">${displayName}</span><span class="ep">${pt}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById('calbody').innerHTML=html;
}

/* ── 팝업 ── */
function showPop(ev,id){
  ev.stopPropagation();
  const e=evs.find(v=>String(v.id)===String(id));if(!e)return;
  const pl=platById(e.plat);
  const totalProducts=e.products.length;
  const rows=e.products.map((p,i)=>{
    const d=p.orig?Math.round((1-p.sale/p.orig)*100):0;
    return`<tr>
      <td style="font-weight:500">${p.name}</td>
      <td class="pop-price-orig">${p.orig?fmt(p.orig):'-'}</td>
      <td class="pop-price-sale">${fmt(p.sale)}</td>
      <td>${d?`<span class="pop-disc">${d}%</span>`:''}</td>
    </tr>`;
  }).join('');

  document.getElementById('pop-header').innerHTML=`
    <div class="pop-plat" style="background:${pl.bg};color:${pl.tc}">${pl.name}</div>
    <div class="pop-name">${e.name}</div>
    <div class="pop-date">📅 ${e.start} ~ ${e.end}</div>`;

  document.getElementById('pop-body').innerHTML=`
    <div class="pop-section-title">행사 상품 (${totalProducts}개)</div>
    <table class="pop-tbl">
      <tr><th>상품명</th><th>정가</th><th>행사가</th><th>할인율</th></tr>
      ${rows}
    </table>
    ${e.memo?`<div class="pop-section-title">메모</div><div class="pop-memo">📌 ${e.memo}</div>`:''}`;

  document.getElementById('pop-edit').onclick=()=>{closePop();openModal(id);};
  document.getElementById('pop').classList.add('open');
  document.getElementById('pop-overlay').classList.add('open');
}
function outPop(e){if(!document.getElementById('pop').contains(e.target))closePop();}
function closePop(){
  document.getElementById('pop').classList.remove('open');
  document.getElementById('pop-overlay').classList.remove('open');
  document.removeEventListener('click',outPop);
}

/* ── 행사 모달 ── */
function openModal(id){
  editId=id||null;
  document.getElementById('mtitle').textContent=id?'행사 수정':'행사 등록';
  document.getElementById('bdl').style.display=id?'block':'none';
  document.getElementById('prows').innerHTML='';
  // 플랫폼 select 동적 생성
  document.getElementById('fp').innerHTML=plats.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(id){
    const e=evs.find(v=>String(v.id)===String(id));
    document.getElementById('fn').value=e.name;
    document.getElementById('fp').value=e.plat;
    document.getElementById('fst').value=e.start;
    document.getElementById('fen').value=e.end;
    document.getElementById('fm').value=e.memo||'';
    e.products.forEach(p=>addProd(p.name,p.orig,p.sale));
  } else {
    ['fn','fm'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fst').value='';document.getElementById('fen').value='';
    addProd();
  }
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function addProd(name='',orig='',sale=''){
  const d=document.createElement('div');d.className='pr';
  d.innerHTML=`<input type="text" placeholder="상품명" value="${name}" class="pn"><input type="number" placeholder="정가" value="${orig||''}" class="po"><input type="number" placeholder="행사가" value="${sale||''}" class="ps"><button style="background:none;border:none;cursor:pointer;color:#E24B4A;font-size:16px;line-height:1;padding:0" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('prows').appendChild(d);
}
async function saveEv(){
  const name=document.getElementById('fn').value.trim();
  const plat=document.getElementById('fp').value;
  const start=document.getElementById('fst').value;
  const end=document.getElementById('fen').value;
  const memo=document.getElementById('fm').value.trim();
  if(!name||!start||!end){alert('행사명, 시작일, 종료일을 입력해주세요.');return;}
  const products=[];
  document.querySelectorAll('#prows .pr').forEach(r=>{
    const nm=r.querySelector('.pn').value.trim();
    const or=Number(r.querySelector('.po').value)||0;
    const sl=Number(r.querySelector('.ps').value)||0;
    if(nm)products.push({name:nm,orig:or,sale:sl});
  });
  const ev={name,plat,start,end,products,memo};
  closeModal();setSyncStatus('loading','저장 중...');
  try{
    if(editId){ev.id=editId;await postToSheets('update',ev);}
    else await postToSheets('add',ev);
    await loadFromSheets();
  } catch{setSyncStatus('err','저장 실패 — 네트워크를 확인해주세요');}
}
async function delEv(){
  if(!confirm('이 행사를 삭제할까요?'))return;
  closeModal();setSyncStatus('loading','삭제 중...');
  try{await postToSheets('delete',{id:editId});await loadFromSheets();}
  catch{setSyncStatus('err','삭제 실패');}
}

// 초기화
loadPlats();
loadFromSheets();
</script>
